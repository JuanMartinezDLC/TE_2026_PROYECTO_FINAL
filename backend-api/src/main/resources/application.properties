spring.application.name=backend-api

# Conexión al contenedor de Docker llamado "db"
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://db:3306/servicio_social_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA para que cree las tablas en base a tus entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true